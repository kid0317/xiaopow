version: "3.8"
services:
  aio-sandbox:
    image: ghcr.io/agent-infra/sandbox:latest   # AIO-Sandbox MCP Server
    ports:
      - "8022:8080"    # Sandbox MCP 端点：http://localhost:8022/mcp
    volumes:
      # skills 目录挂载为只读，供 SkillLoaderTool 在沙盒中访问脚本
      - ./skills:/mnt/skills:ro
      # 通用 workspace 数据与输出目录（课程示例兼容层）
      - ./workspace/output:/workspace/output:rw
      - ./workspace/data:/workspace/data:ro
    security_opt:
      - seccomp:unconfined

