# XiaoPaw 主任务配置
# description 中的 {session_id}, {history}, {user_message} 由 crew.akickoff(inputs=...) 注入

main_task:
  description: |
    【对话上下文】
    Session ID: {session_id}
    沙盒工作目录: /workspace/sessions/{session_id}/

    【历史对话】
    {history}

    【用户消息】
    {user_message}

    请理解用户需求并完成任务。如需专业能力（搜索、文件处理、飞书操作等），
    通过 SkillLoaderTool 加载合适的 Skill。如需查询更多历史对话，
    可使用 history_reader Skill（支持分页读取，参数：session_id, page, page_size）。

  expected_output: |
    以 JSON 格式返回，包含以下字段：
    {
      "reply": "发送给飞书用户的回复，清晰简洁，直接回答需求",
      "used_skills": ["本次调用的 Skill 名称列表，无则为空数组"]
    }
    reply 字段内容应适合通过飞书消息直接发送，语气自然友好。
